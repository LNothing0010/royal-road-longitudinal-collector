name: Royal Road hourly collection

on:
  schedule:
    - cron: "13,33,53 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: royal-road-data-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      RR_USER_AGENT: ${{ secrets.RR_USER_AGENT }}
      RR_DB_PATH: data/rrlab.sqlite
      RR_RAW_DIR: data/raw
      RR_REPORT_DIR: reports
      RR_MIN_DELAY_SECONDS: "2.5"
      RR_TIMEOUT_SECONDS: "45"
      RR_DETAIL_LIMIT_PER_RUN: "40"
      RR_DETAIL_REFRESH_HOURS: "12"
      RR_NEW_FICTION_DETAIL_HOURS: "3"
      RR_NEWEST_MAX_PAGES: "25"
      RR_FRONTIER_OVERLAP_PAGES: "1"
      RR_FRONTIER_ANCHOR_LIMIT: "100"
      RR_CATALOG_STATE_PATH: data/catalog_state.json
      RR_SAVE_RAW_HTML: "0"
      RR_USE_BROWSER_FALLBACK: "0"
      RR_CADENCE_MIN_AGE_MINUTES: "55"
      RR_CADENCE_REPORT: reports/cadence_gate_latest.json

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Decide whether an hourly collection is due
        id: cadence
        env:
          RR_CADENCE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          RR_CADENCE_TRIGGER: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          python -m rrlab.cadence

      - name: Install collector
        if: steps.cadence.outputs.should_collect == 'true'
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --retries 5 --timeout 60 -e ".[dev]"

      - name: Preflight
        if: steps.cadence.outputs.should_collect == 'true'
        run: |
          set -euo pipefail
          rrlab doctor
          python -m compileall -q rrlab tests
          pytest -q
          ruff check rrlab tests
          rrlab init-db
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          db = Path("data/rrlab.sqlite")
          if not db.exists():
              raise SystemExit("Database was not created")
          with sqlite3.connect(db) as conn:
              result = conn.execute("PRAGMA integrity_check").fetchone()[0]
          if result != "ok":
              raise SystemExit(f"SQLite integrity check failed before collection: {result}")
          PY

      - name: Collect and analyze Royal Road launches
        if: steps.cadence.outputs.should_collect == 'true'
        run: |
          set -euo pipefail
          mkdir -p reports
          rrlab collect | tee reports/latest_run_output.json

      - name: Validate launch analysis product
        if: steps.cadence.outputs.should_collect == 'true'
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("reports/launch_analysis_latest.json")
          markdown = Path("reports/launch_analysis_latest.md")
          csv_path = Path("reports/launch_analysis_latest.csv")
          if not path.exists() or not markdown.exists() or not csv_path.exists():
              raise SystemExit("Launch analysis JSON, Markdown or CSV was not generated")
          report = json.loads(path.read_text(encoding="utf-8"))
          for key in ("current_batch", "rolling_cohort", "methodology"):
              if key not in report:
                  raise SystemExit(f"Launch analysis is missing {key}")
          current = report["current_batch"]["summary"]
          quality = current["data_quality"]
          unresolved = quality["partial_metrics"] + quality["missing_detail"]
          if unresolved:
              raise SystemExit(
                  f"Current launch batch has {unresolved} unresolved metric records"
              )
          print(json.dumps({
              "current_batch": current,
              "rolling_summary": report["rolling_cohort"]["summary"],
          }, indent=2))
          PY

      - name: Validate complete prospective frontier
        if: steps.cadence.outputs.should_collect == 'true'
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("reports/latest_run_output.json").read_text(encoding="utf-8"))
          frontier = payload.get("newest_frontier")
          if not frontier:
              raise SystemExit("No Newest frontier result was produced")
          if frontier.get("initialize_anchor"):
              print("Frontier baseline initialized; completeness begins with the next run")
          elif not frontier.get("coverage_complete"):
              raise SystemExit(
                  "Newest frontier is incomplete: previous anchor was not reached within the page ceiling"
              )
          print(json.dumps(frontier, indent=2))
          PY

      - name: Validate Rising Stars panel
        if: steps.cadence.outputs.should_collect == 'true'
        run: |
          set -euo pipefail
          rrlab validate-latest | tee reports/latest_validation_output.json

      - name: Export canonical archive
        if: always() && steps.cadence.outputs.should_collect == 'true'
        run: |
          set -euo pipefail
          if command -v rrlab >/dev/null 2>&1 && [ -s data/rrlab.sqlite ]; then
            rrlab export
            test -s data/export/royal_road_longitudinal_latest.zip
          else
            echo "Collector or database unavailable; skipping export"
          fi

      - name: Write run summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          cadence_path = Path("reports/cadence_gate_latest.json")
          validation_path = Path("reports/validation_latest.json")
          frontier_path = Path("reports/frontier_latest.json")
          launch_path = Path("reports/launch_analysis_latest.json")
          lines = ["# Royal Road collection and launch intelligence", ""]
          cadence = {}
          if cadence_path.exists():
              cadence = json.loads(cadence_path.read_text(encoding="utf-8"))
              lines += [
                  f"- Cadence decision: `{cadence.get('reason')}`",
                  f"- Collection due: `{cadence.get('should_collect')}`",
                  f"- Last complete panel: `{cadence.get('last_complete_panel_utc')}`",
                  f"- Panel age in minutes: `{cadence.get('age_minutes')}`",
                  f"- Trigger: `{cadence.get('trigger')}`",
              ]
          else:
              lines.append("- No cadence report was generated.")

          if cadence.get("should_collect"):
              if validation_path.exists():
                  report = json.loads(validation_path.read_text(encoding="utf-8"))
                  run = report.get("run") or {}
                  lines += [
                      f"- Run ID: `{run.get('run_id', 'unknown')}`",
                      f"- Run status: `{run.get('status', 'unknown')}`",
                      f"- Complete RS analysis: `{report.get('valid_for_complete_rs_analysis', False)}`",
                      f"- Validation issues: `{report.get('issue_count', 0)}`",
                  ]
              else:
                  lines.append("- No panel validation report was generated.")

              if frontier_path.exists():
                  frontier = json.loads(frontier_path.read_text(encoding="utf-8"))
                  lines += [
                      f"- Complete Newest frontier: `{frontier.get('coverage_complete', False)}`",
                      f"- New fictions captured: `{frontier.get('new_fictions', 0)}`",
                      f"- Pages fetched: `{frontier.get('pages_fetched', 0)}`",
                      f"- Boundary page: `{frontier.get('boundary_page')}`",
                  ]
              else:
                  lines.append("- No frontier report was generated.")

              if launch_path.exists():
                  launch = json.loads(launch_path.read_text(encoding="utf-8"))
                  current = launch["current_batch"]["summary"]
                  rolling = launch["rolling_cohort"]["summary"]
                  quality = current["data_quality"]
                  lines += [
                      "",
                      "## Launch intelligence",
                      "",
                      f"- New novels in this run: **{current['novel_count']}**",
                      f"- Current-batch core coverage: **{quality['core_coverage_pct']}%**",
                      f"- Current-batch resolved coverage: **{quality['resolved_coverage_pct']}%**",
                      f"- Rolling cohort size: **{rolling['novel_count']}**",
                  ]
                  leader_labels = {
                      "overall_launch_index": "Overall launch leader",
                      "followers": "Follower leader",
                      "views": "View leader",
                      "conversion": "Conversion leader",
                      "follower_momentum": "Follower momentum leader",
                      "best_current_rs_rank": "Best current RS rank",
                  }
                  for key, label in leader_labels.items():
                      leader = rolling["leaders"].get(key)
                      if leader:
                          lines.append(
                              f"- {label}: **{leader['title']}** "
                              f"(`{leader['metric']}={leader['value']}`)"
                          )
                  lines.append("")
                  lines.append(
                      "See `reports/launch_analysis_latest.md` for the full table and exceptions."
                  )
              else:
                  lines.append("- No launch analysis report was generated.")
          else:
              lines.append("- No Royal Road requests were made during this schedule opportunity.")
          summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload latest archive and diagnostics
        if: always() && steps.cadence.outputs.should_collect == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: royal-road-longitudinal-${{ github.run_id }}
          path: |
            data/export/royal_road_longitudinal_latest.zip
            reports/*
          if-no-files-found: warn
          retention-days: 90

      - name: Persist canonical data and diagnostics
        if: always() && steps.cadence.outputs.should_collect == 'true'
        run: |
          set -euo pipefail
          mkdir -p data reports
          git config user.name "rr-longitudinal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- data reports
          if git diff --cached --quiet; then
            echo "No canonical changes to commit"
            exit 0
          fi
          git commit -m "Collect Royal Road snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing onto origin/${GITHUB_REF_NAME}"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
            sleep $((attempt * 2))
          done
          echo "Unable to persist collected data after three push attempts" >&2
          exit 1
