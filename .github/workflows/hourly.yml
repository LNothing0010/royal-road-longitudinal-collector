name: Royal Road hourly collection

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: royal-road-hourly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      RR_USER_AGENT: ${{ secrets.RR_USER_AGENT }}
      RR_DB_PATH: data/rrlab.sqlite
      RR_RAW_DIR: data/raw
      RR_REPORT_DIR: reports
      RR_MIN_DELAY_SECONDS: "2.5"
      RR_TIMEOUT_SECONDS: "45"
      RR_DETAIL_LIMIT_PER_RUN: "40"
      RR_DETAIL_REFRESH_HOURS: "12"
      RR_NEW_FICTION_DETAIL_HOURS: "3"
      RR_SAVE_RAW_HTML: "0"
      RR_USE_BROWSER_FALLBACK: "0"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply v0.3.1 compatibility migration
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          parser_path = Path("rrlab/parsers.py")
          parser_text = parser_path.read_text(encoding="utf-8")
          old_number_re = 'NUMBER_RE = re.compile(r"([\\d,.]+)\\s*([kKmMbB]?)")'
          new_number_re = 'NUMBER_RE = re.compile(r"(\\d[\\d,]*(?:\\.\\d+)?)\\s*([kKmMbB]?)")'
          if old_number_re in parser_text:
              parser_text = parser_text.replace(old_number_re, new_number_re)
              parser_path.write_text(parser_text, encoding="utf-8")
          elif new_number_re not in parser_text:
              raise SystemExit("Unexpected NUMBER_RE definition; refusing an unsafe automatic edit")

          tests_path = Path("tests/test_parsers.py")
          tests_text = tests_path.read_text(encoding="utf-8")
          old_import = "from rrlab.parsers import parse_detail_html, parse_listing_html"
          new_import = (
              "from rrlab.parsers import metric_from_text, parse_detail_html, "
              "parse_listing_html, parse_number"
          )
          if old_import in tests_text:
              tests_text = tests_text.replace(old_import, new_import)
          if "def test_numeric_placeholders_are_treated_as_missing" not in tests_text:
              tests_text += '''\n\ndef test_numeric_placeholders_are_treated_as_missing():\n    assert parse_number(".") is None\n    assert parse_number("—") is None\n    assert metric_from_text("Ratings: .", ("ratings", "rating")) is None\n    assert parse_number("1.2k") == 1200\n'''
          tests_path.write_text(tests_text, encoding="utf-8")

          pyproject = Path("pyproject.toml")
          pyproject_text = pyproject.read_text(encoding="utf-8")
          pyproject_text = pyproject_text.replace('version = "0.3.0"', 'version = "0.3.1"')
          pyproject.write_text(pyproject_text, encoding="utf-8")

          init_path = Path("rrlab/__init__.py")
          init_text = init_path.read_text(encoding="utf-8").replace('0.3.0', '0.3.1')
          init_path.write_text(init_text, encoding="utf-8")

          changelog = Path("CHANGELOG.md")
          changelog_text = changelog.read_text(encoding="utf-8")
          if "## 0.3.1" not in changelog_text:
              entry = '''# Changelog\n\n## 0.3.1 — 2026-07-14\n\n- Fixed punctuation-only Royal Road metric placeholders such as `.` being parsed as floats.\n- Separated optional detail-enrichment warnings from core list-collection failures.\n- Replaced schema-coupled inline workflow SQL with the collector's versioned validator.\n- Persisted partial runs and diagnostics even when validation fails, preventing silent data loss.\n- Upgraded artifact upload to the Node 24-compatible official action major.\n\n'''
              changelog_text = entry + changelog_text.removeprefix("# Changelog\n\n")
              changelog.write_text(changelog_text, encoding="utf-8")
          PY

      - name: Install collector
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --retries 5 --timeout 60 -e ".[dev]"

      - name: Preflight
        run: |
          set -euo pipefail
          rrlab doctor
          python -m compileall -q rrlab tests
          pytest -q
          ruff check rrlab tests
          rrlab init-db
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          db = Path("data/rrlab.sqlite")
          if not db.exists():
              raise SystemExit("Database was not created")
          with sqlite3.connect(db) as conn:
              result = conn.execute("PRAGMA integrity_check").fetchone()[0]
          if result != "ok":
              raise SystemExit(f"SQLite integrity check failed before collection: {result}")
          PY

      - name: Collect public Royal Road panel
        run: |
          set -euo pipefail
          mkdir -p reports
          rrlab collect | tee reports/latest_run_output.json

      - name: Validate collected data
        run: |
          set -euo pipefail
          rrlab validate-latest | tee reports/latest_validation_output.json

      - name: Export canonical archive
        if: always()
        run: |
          set -euo pipefail
          if command -v rrlab >/dev/null 2>&1 && [ -s data/rrlab.sqlite ]; then
            rrlab export
            test -s data/export/royal_road_longitudinal_latest.zip
          else
            echo "Collector or database unavailable; skipping export"
          fi

      - name: Write run summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_path = Path("reports/validation_latest.json")
          lines = ["# Royal Road collection", ""]
          if report_path.exists():
              report = json.loads(report_path.read_text(encoding="utf-8"))
              run = report.get("run") or {}
              lines += [
                  f"- Run ID: `{run.get('run_id', 'unknown')}`",
                  f"- Run status: `{run.get('status', 'unknown')}`",
                  f"- Complete RS analysis: `{report.get('valid_for_complete_rs_analysis', False)}`",
                  f"- Validation issues: `{report.get('issue_count', 0)}`",
              ]
              for issue in report.get("issues", []):
                  lines.append(f"  - `{issue.get('severity')}` `{issue.get('code')}`: {issue}")
          else:
              lines.append("- No validation report was generated.")
          summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload latest archive and diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: royal-road-longitudinal-${{ github.run_id }}
          path: |
            data/export/royal_road_longitudinal_latest.zip
            reports/*.json
          if-no-files-found: warn
          retention-days: 90

      - name: Persist canonical data and diagnostics
        if: always()
        run: |
          set -euo pipefail
          mkdir -p data reports
          git config user.name "rr-longitudinal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- rrlab tests pyproject.toml CHANGELOG.md data reports
          if git diff --cached --quiet; then
            echo "No canonical changes to commit"
            exit 0
          fi
          git commit -m "Collect Royal Road snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing onto origin/${GITHUB_REF_NAME}"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
            sleep $((attempt * 2))
          done
          echo "Unable to persist collected data after three push attempts" >&2
          exit 1
