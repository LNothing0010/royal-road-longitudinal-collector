name: Bootstrap collector

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Unpack collector package
        run: |
          rm -rf /tmp/rrcollector
          mkdir -p /tmp/rrcollector
          unzip -q collector-package.zip -d /tmp/rrcollector
          rsync -a --delete --exclude='.git/' /tmp/rrcollector/royal-road-longitudinal-collector/ ./
          rm -f collector-package.zip
          rm -f .github/workflows/bootstrap.yml
      - name: Commit collector source
        run: |
          git config user.name "rr-longitudinal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Install Royal Road longitudinal collector v0.2"
          git push origin HEAD:main
