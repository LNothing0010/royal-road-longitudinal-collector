name: Install verified collector source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Materialize checksum-verified source
        run: python install_source.py

      - name: Install and verify
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --retries 5 --timeout 60 -e ".[dev]"
          rrlab doctor
          python -m compileall -q rrlab tests
          pytest -q
          ruff check rrlab tests

      - name: Commit verified source
        run: |
          set -euo pipefail
          git config user.name "rr-longitudinal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- ':!.github/workflows'
          git diff --cached --quiet || git commit -m "Install Royal Road collector v0.3.0"
          git push origin HEAD:main
