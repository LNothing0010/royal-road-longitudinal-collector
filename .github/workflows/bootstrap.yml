name: Bootstrap collector

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate package
        run: test -f collector-package.zip

      - name: Install and harden collector
        run: |
          rm -rf /tmp/rrcollector
          mkdir -p /tmp/rrcollector
          unzip -q collector-package.zip -d /tmp/rrcollector

          # Preserve existing workflow files. GitHub blocks workflow files created
          # by the Actions installation token when it lacks the workflows scope.
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            /tmp/rrcollector/royal-road-longitudinal-collector/ ./

          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('pyproject.toml'): [('version = "0.2.0"', 'version = "0.2.1"')],
              Path('rrlab/__init__.py'): [('0.2.0', '0.2.1')],
              Path('rrlab/http_source.py'): [('http2=True', 'http2=False')],
              Path('rrlab/config.py'): [
                  ('os.getenv("RR_USER_AGENT", "RoyalRoadLongitudinalLab/0.2")',
                   'os.getenv("RR_USER_AGENT") or "RoyalRoadLongitudinalLab/0.2.1 (public research; github.com/LNothing0010)"')
              ],
          }

          for path, edits in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in edits:
                  if old not in text:
                      raise SystemExit(f'Expected text not found in {path}: {old}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          gitignore = Path('.gitignore')
          text = gitignore.read_text(encoding='utf-8')
          if 'data/export/*.zip' not in text:
              text += '\ndata/export/*.zip\n'
          gitignore.write_text(text, encoding='utf-8')
          PY

          cat > CHANGELOG.md <<'MD'
          # Changelog

          ## 0.2.1 — 2026-07-14

          - Installed the complete collector directly in the repository.
          - Disabled unnecessary HTTP/2 mode, removing a hidden runtime dependency.
          - Preserved GitHub workflow files during bootstrap to avoid GitHub App workflow-scope failures.
          - Stopped committing generated ZIP exports every hour; exports will remain available as workflow artifacts.
          - Kept canonical SQLite, compressed raw JSON and validation reports under version control for the pilot.
          MD

          rm -f collector-package.zip

      - name: Verify package
        run: |
          python -m pip install -e ".[dev]"
          pytest -q
          python -m compileall -q rrlab tests

      - name: Commit collector source
        run: |
          git config user.name "rr-longitudinal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- ':!.github/workflows'
          git diff --cached --quiet || git commit -m "Install Royal Road longitudinal collector v0.2.1"
          git push origin HEAD:main
