name: Install verified collector source

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-royal-road-collector-${{ github.ref }}
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Materialize checksum-verified source
        run: |
          set -euo pipefail
          python install_source.py
          test -f pyproject.toml
          test -f rrlab/cli.py
          test -f tests/test_parsers.py

      - name: Install and verify
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --retries 5 --timeout 60 -e ".[dev]"
          rrlab doctor
          python -m compileall -q rrlab tests
          pytest -q
          ruff check rrlab tests

      - name: Commit verified source
        run: |
          set -euo pipefail
          git config user.name "rr-longitudinal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Verified collector source is already installed"
            exit 0
          fi
          git commit -m "Install Royal Road collector v0.3.0"
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing onto origin/${GITHUB_REF_NAME}"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
            sleep $((attempt * 2))
          done
          echo "Unable to persist the verified source after three push attempts" >&2
          exit 1
