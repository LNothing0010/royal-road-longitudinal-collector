name: Bootstrap collector

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and extract package
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from zipfile import BadZipFile, ZipFile

          archive = Path("collector-package.zip")
          if not archive.is_file() or archive.stat().st_size == 0:
              raise SystemExit("collector-package.zip is missing or empty")

          target = Path("/tmp/rrcollector")
          if target.exists():
              import shutil
              shutil.rmtree(target)
          target.mkdir(parents=True)

          try:
              with ZipFile(archive) as bundle:
                  corrupt = bundle.testzip()
                  if corrupt:
                      raise SystemExit(f"Corrupt member in collector package: {corrupt}")
                  bundle.extractall(target)
          except BadZipFile as exc:
              raise SystemExit(f"collector-package.zip is not a valid ZIP archive: {exc}") from exc

          roots = sorted({p.parent for p in target.rglob("pyproject.toml")})
          if len(roots) != 1:
              raise SystemExit(f"Expected exactly one package root, found {len(roots)}: {roots}")
          Path("/tmp/rrcollector-root.txt").write_text(str(roots[0]), encoding="utf-8")
          print(f"Validated package root: {roots[0]}")
          PY

      - name: Install and harden collector
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_ROOT="$(cat /tmp/rrcollector-root.txt)"

          # Copy package contents without touching existing workflow files.
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            "$PACKAGE_ROOT/" ./

          python - <<'PY'
          from pathlib import Path

          def replace_if_present(path: str, old: str, new: str) -> None:
              p = Path(path)
              if not p.exists():
                  return
              text = p.read_text(encoding="utf-8")
              if old in text:
                  p.write_text(text.replace(old, new), encoding="utf-8")

          replace_if_present("pyproject.toml", 'version = "0.2.0"', 'version = "0.2.1"')
          replace_if_present("rrlab/__init__.py", "0.2.0", "0.2.1")
          replace_if_present("rrlab/http_source.py", "http2=True", "http2=False")
          replace_if_present(
              "rrlab/config.py",
              'os.getenv("RR_USER_AGENT", "RoyalRoadLongitudinalLab/0.2")',
              'os.getenv("RR_USER_AGENT") or "RoyalRoadLongitudinalLab/0.2.1 (public research; github.com/LNothing0010)"',
          )

          gitignore = Path(".gitignore")
          text = gitignore.read_text(encoding="utf-8") if gitignore.exists() else ""
          if "data/export/*.zip" not in text:
              text += "\ndata/export/*.zip\n"
          gitignore.write_text(text, encoding="utf-8")
          PY

          cat > CHANGELOG.md <<'MD'
          # Changelog

          ## 0.2.1 — 2026-07-14

          - Installed the complete collector directly in the repository.
          - Replaced the external `unzip` bootstrap with Python's standard `zipfile` validation and extraction.
          - Disabled unnecessary HTTP/2 mode, removing a hidden runtime dependency.
          - Preserved GitHub workflow files during bootstrap to avoid GitHub App workflow-scope failures.
          - Made bootstrap independent of the ZIP top-level directory name.
          - Made hardening edits tolerant of harmless package-version drift.
          - Stopped committing generated ZIP exports every hour; exports remain workflow artifacts.
          - Kept canonical SQLite, compressed raw JSON and validation reports under version control for the pilot.
          MD

          rm -f collector-package.zip

      - name: Verify package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          pytest -q
          python -m compileall -q rrlab tests

      - name: Commit collector source
        run: |
          set -euo pipefail
          git config user.name "rr-longitudinal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- ':!.github/workflows'
          git diff --cached --quiet || git commit -m "Install Royal Road longitudinal collector v0.2.1"
          git push origin HEAD:main
