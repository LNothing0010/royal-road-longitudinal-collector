name: Collector CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
      - "reports/**"
  pull_request:
    paths-ignore:
      - "data/**"
      - "reports/**"

permissions:
  contents: read

concurrency:
  group: collector-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --retries 5 --timeout 60 -e ".[dev]"

      - name: Doctor
        run: rrlab doctor

      - name: Compile
        run: python -m compileall -q rrlab tests

      - name: Tests
        run: pytest -q

      - name: Ruff diagnostics
        id: ruff
        continue-on-error: true
        run: |
          set +e
          ruff check rrlab tests --output-format=json > ruff-diagnostics.json
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-diagnostics
          path: ruff-diagnostics.json
          if-no-files-found: error
          retention-days: 1

      - name: Enforce Ruff
        if: always()
        run: |
          test "${{ steps.ruff.outputs.status }}" = "0"
